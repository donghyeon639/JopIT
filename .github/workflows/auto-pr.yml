name: Auto PR (dev to main)

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Open or update PR from dev to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing open PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "number=$existing" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when PR already exists
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "이미 열린 dev -> main PR #${{ steps.check.outputs.number }} 가 있습니다. 생성 단계는 건너뜁니다."

      - name: Create PR
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "[Auto] dev to main 머지 요청" \
            --body "$(cat <<'EOF'
          ## 변경사항
          <!-- 이번 PR에서 무엇이 바뀌었는지 한두 줄로 요약. 관련 이슈가 있으면 Close #이슈번호 형태로 적기 -->
          -
          - Close #

          ## 체크할 사항
          ```
          [ ] DB 스키마/마이그레이션 영향 확인
          [ ] 인증/인가/CORS 등 보안 정책 영향 확인
          [ ] 환경 변수·시크릿 추가/변경 여부
          [ ] 프런트 API 계약 변경 여부
          [ ] 신규 의존성 추가 여부
          ```

          ## 테스트 하는 법
          - 코드 받기
          ```
          git fetch origin dev
          git checkout dev
          ```
          - 백엔드 실행
          ```
          ./gradlew bootRun
          ```
          - 프런트 실행
          ```
          cd frontend
          npm install
          npm run dev
          ```
          - 검증할 시나리오
            -
            -
          EOF
          )"