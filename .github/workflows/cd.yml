name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

concurrency:
  group: prephub-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: [self-hosted, Linux, X64]
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Execute deploy.sh locally on self-hosted runner
        shell: bash
        run: |
          set -euxo pipefail
          whoami
          hostname
          pwd
          ls -al /home/ec2-user/devprep
          command -v java || true
          java -version || true
          command -v npm || true
          npm -v || true
          command -v git || true
          chmod +x /home/ec2-user/devprep/deploy.sh
          /home/ec2-user/devprep/deploy.sh
