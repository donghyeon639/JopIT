name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Test (Gradle)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prephub_test
          POSTGRES_USER: prephub
          POSTGRES_PASSWORD: prephub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prephub -d prephub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/prephub_test
      SPRING_DATASOURCE_USERNAME: prephub
      SPRING_DATASOURCE_PASSWORD: prephub
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      JWT_SECRET: ci-test-jwt-secret-key-at-least-32-characters
      GITHUB_TOKEN: ci-dummy-token
      GITHUB_OWNER: ci-owner
      GITHUB_REPO: ci-repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run backend tests (retry once on failure)
        run: |
          ./gradlew test --no-daemon || (echo "Retrying backend tests once..." && ./gradlew test --no-daemon)

  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (retry once on failure)
        run: |
          npm run build || (echo "Retrying frontend build once..." && npm run build)

