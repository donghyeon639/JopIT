spring.application.name=prephub

# ===== DataSource =====
# 모든 값은 환경변수로 주입. 로컬 dev는 .env / IDE Run config / application-local.properties 에서.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Server =====
server.port=${SERVER_PORT:8081}

# ===== Pagination =====
# 클라이언트가 size 파라미터를 너무 크게 보내도 50으로 자름 (Service의 sanitize와 함께 2중 방어)
spring.data.web.pageable.max-page-size=50

# ===== JWT (최소 32자 이상) =====
jwt.secret=${JWT_SECRET:prephub-default-secret-key-must-be-at-least-32-chars}
jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:900}

# ===== GitHub API (이슈 등록용) =====
github.token=${GITHUB_TOKEN:}
github.owner=${GITHUB_OWNER:donghyeon639}
github.repo=${GITHUB_REPO:JopIT}

# ===== Claude CLI =====
claude.cli.timeout-seconds=${CLAUDE_CLI_TIMEOUT_SECONDS:180}

# ===== 공공 채용 (ALIO) — 키는 공공데이터포털에서 발급 =====
publicjob.alio.base-url=${PUBLIC_JOB_ALIO_BASE_URL:https://opendata.alio.go.kr}
publicjob.alio.list-path=${PUBLIC_JOB_ALIO_LIST_PATH:/new/v1/recruit/list.do}
# NCS 직무분류 코드 (쉼표 구분). R600020=정보통신(IT). 추후 확장 시 ENV로 덮어쓰기.
publicjob.alio.ncs-codes=${PUBLIC_JOB_ALIO_NCS_CODES:R600020}
publicjob.alio.api-key=${PUBLIC_JOB_ALIO_API_KEY:}

# ===== Multipart (이력서 첨삭 업로드) =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== 소셜 로그인 리다이렉트 =====
app.social.redirect-uri=${APP_SOCIAL_REDIRECT_URI:http://localhost:5173/social/callback}
app.social.failure-redirect-uri=${APP_SOCIAL_FAILURE_REDIRECT_URI:http://localhost:5173/login?reason=social_failed}

# ===== Google OAuth2 =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/social/callback/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ===== GitHub OAuth2 =====
spring.security.oauth2.client.registration.github.client-id=${GITHUB_OAUTH_CLIENT_ID:dummy-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:dummy-github-client-secret}
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/api/social/callback/{registrationId}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ===== Kakao OAuth2 =====
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:dummy-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:dummy-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/api/social/callback/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id