spring:
  application:
    name: prephub
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/prephub}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            redirect-uri: "{baseUrl}/api/social/callback/{registrationId}"
            scope: openid,profile,email
          github:
            client-id: ${GITHUB_OAUTH_CLIENT_ID:dummy-github-client-id}
            client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:dummy-github-client-secret}
            redirect-uri: "{baseUrl}/api/social/callback/{registrationId}"
            scope: read:user,user:email
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/social/callback/{registrationId}"
            scope: profile_nickname,account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:prephub-default-secret-key-must-be-at-least-32-chars}
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY:900}

github:
  token: ${GITHUB_TOKEN:dummy-github-token}
  owner: ${GITHUB_OWNER:donghyeon639}
  repo: ${GITHUB_REPO:JopIT}

claude:
  cli:
    timeout-seconds: ${CLAUDE_CLI_TIMEOUT:180}

app:
  social:
    redirect-uri: ${APP_SOCIAL_REDIRECT_URI:http://localhost:5173/social/callback}
    failure-redirect-uri: ${APP_SOCIAL_FAILURE_REDIRECT_URI:http://localhost:5173/login?reason=social_failed}
