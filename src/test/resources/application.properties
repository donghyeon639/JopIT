# 테스트 전용 설정 — src/main/resources/application.properties
# CI/로컬 테스트가 Spring 컨텍스트를 올릴 수 있도록 더미 값과 OAuth provider 설정 제공.
# 운영 jar에는 포함되지 않음 (src/test 디렉토리).
#


spring.application.name=prephub-test

# ===== DataSource (CI postgres service container 기준) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/prephub_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:prephub}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:prephub}
spring.datasource.driver-class-name=org.postgresql.Driver

# 테스트마다 스키마 새로 만들기
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=0

spring.data.web.pageable.max-page-size=50

# ===== JWT (32자 이상 더미) =====
jwt.secret=${JWT_SECRET:test-jwt-secret-key-at-least-32-characters-long}
jwt.access-token-validity-seconds=900

# ===== GitHub API =====
github.token=${GITHUB_TOKEN:test-token}
github.owner=${GITHUB_OWNER:test-owner}
github.repo=${GITHUB_REPO:test-repo}

# ===== Claude CLI =====
claude.cli.timeout-seconds=180

# ===== 공공 채용 ALIO — 키 비워두면 AlioJobPostingFetcher.isConfigured()가 false 반환해서 동기화 skip =====
publicjob.alio.base-url=https://opendata.alio.go.kr
publicjob.alio.list-path=/new/v1/recruit/list.do
publicjob.alio.ncs-codes=R600020
publicjob.alio.api-key=

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== 소셜 로그인 리다이렉트 =====
app.social.redirect-uri=http://localhost:5173/social/callback
app.social.failure-redirect-uri=http://localhost:5173/login?reason=social_failed

# ===== OAuth2 (provider 설정이 빠지면 컨텍스트 빈 생성 실패하므로 더미 값으로 채움) =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test-google-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/social/callback/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_OAUTH_CLIENT_ID:test-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:test-github-client-secret}
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/api/social/callback/{registrationId}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:test-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:test-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/api/social/callback/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id